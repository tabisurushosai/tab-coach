<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="extension_name">tab-coach</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
      }
      body {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 20px;
        font-weight: 600;
      }
      h2 {
        margin: 24px 0 8px;
        font-size: 16px;
        font-weight: 600;
      }
      .hint {
        margin: 0 0 12px;
        color: #6b7280;
        font-size: 12px;
      }
      .whitelist-form {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 8px;
        align-items: end;
        margin-bottom: 8px;
      }
      .whitelist-form label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 12px;
        color: #374151;
      }
      .whitelist-form input {
        padding: 6px 8px;
        font: inherit;
        font-size: 13px;
        border: 1px solid rgba(0, 0, 0, 0.16);
        border-radius: 4px;
        background: transparent;
        color: inherit;
        box-sizing: border-box;
      }
      .whitelist-form input:focus {
        outline: 2px solid #2563eb;
        outline-offset: 1px;
      }
      .whitelist-add-button {
        padding: 7px 14px;
        border: 0;
        border-radius: 4px;
        background: #2563eb;
        color: #fff;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .whitelist-add-button:hover,
      .whitelist-add-button:focus-visible {
        background: #1d4ed8;
        outline: none;
      }
      .whitelist-error {
        min-height: 18px;
        margin: 0 0 8px;
        color: #b91c1c;
        font-size: 12px;
      }
      .whitelist-list {
        list-style: none;
        margin: 0;
        padding: 0;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 4px;
      }
      .whitelist-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      }
      .whitelist-item:last-child {
        border-bottom: 0;
      }
      .whitelist-item-body {
        flex: 1;
        min-width: 0;
      }
      .whitelist-item-pattern {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        word-break: break-all;
      }
      .whitelist-item-meta {
        margin-top: 2px;
        font-size: 11px;
        color: #6b7280;
      }
      .whitelist-remove-button {
        flex-shrink: 0;
        padding: 5px 10px;
        border: 1px solid rgba(0, 0, 0, 0.16);
        border-radius: 4px;
        background: transparent;
        color: inherit;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      .whitelist-remove-button:hover,
      .whitelist-remove-button:focus-visible {
        background: rgba(0, 0, 0, 0.04);
        outline: none;
      }
      .whitelist-empty {
        padding: 12px;
        color: #6b7280;
        text-align: center;
        font-size: 13px;
      }
      .thresholds-form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 12px;
        align-items: end;
        margin-bottom: 8px;
      }
      .thresholds-form label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 12px;
        color: #374151;
      }
      .thresholds-form input {
        padding: 6px 8px;
        font: inherit;
        font-size: 13px;
        border: 1px solid rgba(0, 0, 0, 0.16);
        border-radius: 4px;
        background: transparent;
        color: inherit;
        box-sizing: border-box;
      }
      .thresholds-form input:focus {
        outline: 2px solid #2563eb;
        outline-offset: 1px;
      }
      .thresholds-actions {
        grid-column: 1 / -1;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .thresholds-save-button {
        padding: 7px 14px;
        border: 0;
        border-radius: 4px;
        background: #2563eb;
        color: #fff;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .thresholds-save-button:hover,
      .thresholds-save-button:focus-visible {
        background: #1d4ed8;
        outline: none;
      }
      .thresholds-save-button:disabled {
        background: #93c5fd;
        cursor: progress;
      }
      .thresholds-reset-button {
        padding: 6px 12px;
        border: 1px solid rgba(0, 0, 0, 0.16);
        border-radius: 4px;
        background: transparent;
        color: inherit;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      .thresholds-reset-button:hover,
      .thresholds-reset-button:focus-visible {
        background: rgba(0, 0, 0, 0.04);
        outline: none;
      }
      .thresholds-status {
        min-height: 18px;
        margin: 0;
        font-size: 12px;
        color: #15803d;
      }
      .thresholds-status.is-error {
        color: #b91c1c;
      }
      .archive-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        margin: 24px 0 8px;
        flex-wrap: wrap;
      }
      .archive-header h2 {
        margin: 0;
      }
      .archive-header-meta {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .archive-count {
        font-size: 12px;
        color: #6b7280;
      }
      .archive-export-button,
      .archive-import-button {
        padding: 5px 12px;
        border: 1px solid rgba(0, 0, 0, 0.16);
        border-radius: 4px;
        background: transparent;
        color: inherit;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      .archive-export-button:hover,
      .archive-export-button:focus-visible,
      .archive-import-button:hover,
      .archive-import-button:focus-visible {
        background: rgba(0, 0, 0, 0.04);
        outline: none;
      }
      .archive-export-button:disabled,
      .archive-import-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .archive-import-file-input {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
        border: 0;
      }
      .archive-status {
        min-height: 18px;
        margin: 0 0 8px;
        font-size: 12px;
        color: #15803d;
      }
      .archive-status.is-error {
        color: #b91c1c;
      }
      .archive-list {
        list-style: none;
        margin: 0;
        padding: 0;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 4px;
        max-height: 360px;
        overflow-y: auto;
      }
      .archive-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 8px 12px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      }
      .archive-item:last-child {
        border-bottom: 0;
      }
      .archive-item-favicon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        margin-top: 2px;
        border-radius: 2px;
        background: rgba(0, 0, 0, 0.06);
        object-fit: contain;
      }
      .archive-item-body {
        flex: 1;
        min-width: 0;
      }
      .archive-item-title {
        font-size: 13px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .archive-item-url {
        margin-top: 2px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: #6b7280;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .archive-item-meta {
        margin-top: 2px;
        font-size: 11px;
        color: #6b7280;
      }
      .archive-actions {
        flex-shrink: 0;
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .archive-open-button,
      .archive-restore-button {
        flex-shrink: 0;
        padding: 4px 8px;
        border: 1px solid rgba(0, 0, 0, 0.16);
        border-radius: 4px;
        background: transparent;
        color: inherit;
        font: inherit;
        font-size: 12px;
        text-decoration: none;
        cursor: pointer;
      }
      .archive-open-button:hover,
      .archive-open-button:focus-visible,
      .archive-restore-button:hover,
      .archive-restore-button:focus-visible {
        background: rgba(0, 0, 0, 0.04);
        outline: none;
      }
      .archive-restore-button:disabled {
        opacity: 0.5;
        cursor: progress;
      }
      .archive-empty {
        padding: 12px;
        color: #6b7280;
        text-align: center;
        font-size: 13px;
      }
      @media (prefers-color-scheme: dark) {
        .hint,
        .whitelist-form label,
        .whitelist-item-meta,
        .whitelist-empty,
        .thresholds-form label,
        .archive-count,
        .archive-item-url,
        .archive-item-meta,
        .archive-empty {
          color: #9ca3af;
        }
        .whitelist-form input,
        .thresholds-form input {
          border-color: rgba(255, 255, 255, 0.16);
        }
        .whitelist-list,
        .archive-list {
          border-color: rgba(255, 255, 255, 0.12);
        }
        .whitelist-item,
        .archive-item {
          border-bottom-color: rgba(255, 255, 255, 0.08);
        }
        .archive-item-favicon {
          background: rgba(255, 255, 255, 0.08);
        }
        .whitelist-remove-button,
        .thresholds-reset-button,
        .archive-open-button,
        .archive-restore-button,
        .archive-export-button,
        .archive-import-button {
          border-color: rgba(255, 255, 255, 0.16);
        }
        .whitelist-remove-button:hover,
        .whitelist-remove-button:focus-visible,
        .thresholds-reset-button:hover,
        .thresholds-reset-button:focus-visible,
        .archive-open-button:hover,
        .archive-open-button:focus-visible,
        .archive-restore-button:hover,
        .archive-restore-button:focus-visible,
        .archive-export-button:hover,
        .archive-export-button:focus-visible,
        .archive-import-button:hover,
        .archive-import-button:focus-visible {
          background: rgba(255, 255, 255, 0.06);
        }
        .whitelist-error,
        .thresholds-status.is-error,
        .archive-status.is-error {
          color: #fca5a5;
        }
        .thresholds-status,
        .archive-status {
          color: #86efac;
        }
      }
    </style>
  </head>
  <body>
    <h1 id="title" data-i18n="extension_name">tab-coach</h1>

    <section aria-labelledby="thresholds-title">
      <h2 id="thresholds-title" data-i18n="thresholds_section_title">Badge thresholds</h2>
      <p class="hint" data-i18n="thresholds_section_hint"></p>
      <form id="thresholds-form" class="thresholds-form" novalidate>
        <label>
          <span data-i18n="thresholds_yellow_label">Yellow threshold</span>
          <input
            id="thresholds-yellow"
            type="number"
            min="1"
            max="999"
            step="1"
            inputmode="numeric"
            autocomplete="off"
            required
          />
        </label>
        <label>
          <span data-i18n="thresholds_red_label">Red threshold</span>
          <input
            id="thresholds-red"
            type="number"
            min="1"
            max="999"
            step="1"
            inputmode="numeric"
            autocomplete="off"
            required
          />
        </label>
        <div class="thresholds-actions">
          <button
            type="submit"
            id="thresholds-save-button"
            class="thresholds-save-button"
            data-i18n="thresholds_save_button"
          >
            Save
          </button>
          <button
            type="button"
            id="thresholds-reset-button"
            class="thresholds-reset-button"
            data-i18n="thresholds_reset_button"
          >
            Reset to defaults
          </button>
        </div>
      </form>
      <p id="thresholds-status" class="thresholds-status" role="status" aria-live="polite"></p>
    </section>

    <section aria-labelledby="inactive-title">
      <h2 id="inactive-title" data-i18n="inactive_section_title">Inactive threshold</h2>
      <p class="hint" data-i18n="inactive_section_hint"></p>
      <form id="inactive-form" class="thresholds-form" novalidate>
        <label>
          <span data-i18n="inactive_minutes_label">Inactive minutes</span>
          <input
            id="inactive-minutes"
            type="number"
            min="1"
            max="1440"
            step="1"
            inputmode="numeric"
            autocomplete="off"
            required
          />
        </label>
        <div class="thresholds-actions">
          <button
            type="submit"
            id="inactive-save-button"
            class="thresholds-save-button"
            data-i18n="inactive_save_button"
          >
            Save
          </button>
          <button
            type="button"
            id="inactive-reset-button"
            class="thresholds-reset-button"
            data-i18n="inactive_reset_button"
          >
            Reset to default
          </button>
        </div>
      </form>
      <p id="inactive-status" class="thresholds-status" role="status" aria-live="polite"></p>
    </section>

    <section aria-labelledby="whitelist-title">
      <h2 id="whitelist-title" data-i18n="whitelist_section_title">Whitelist</h2>
      <p class="hint" data-i18n="whitelist_section_hint"></p>
      <form id="whitelist-form" class="whitelist-form" novalidate>
        <label>
          <span data-i18n="whitelist_pattern_label">URL pattern</span>
          <input
            id="whitelist-pattern"
            type="text"
            autocomplete="off"
            spellcheck="false"
            maxlength="256"
            required
            data-i18n-attr="placeholder:whitelist_pattern_placeholder"
          />
        </label>
        <label>
          <span data-i18n="whitelist_note_label">Note (optional)</span>
          <input
            id="whitelist-note"
            type="text"
            autocomplete="off"
            maxlength="200"
            data-i18n-attr="placeholder:whitelist_note_placeholder"
          />
        </label>
        <button
          type="submit"
          id="whitelist-add-button"
          class="whitelist-add-button"
          data-i18n="whitelist_add_button"
        >
          Add
        </button>
      </form>
      <p id="whitelist-error" class="whitelist-error" role="alert" aria-live="polite"></p>
      <ul
        id="whitelist-list"
        class="whitelist-list"
        role="list"
        aria-label="Whitelist entries"
      ></ul>
    </section>

    <section aria-labelledby="archive-title">
      <div class="archive-header">
        <h2 id="archive-title" data-i18n="archive_section_title">Archive</h2>
        <div class="archive-header-meta">
          <span id="archive-count" class="archive-count" aria-live="polite"></span>
          <button
            type="button"
            id="archive-import-button"
            class="archive-import-button"
            data-i18n="archive_import_button"
          >
            Import JSON
          </button>
          <input
            id="archive-import-file"
            class="archive-import-file-input"
            type="file"
            accept="application/json,.json"
            tabindex="-1"
            aria-hidden="true"
          />
          <button
            type="button"
            id="archive-export-button"
            class="archive-export-button"
            data-i18n="archive_export_button"
          >
            Export JSON
          </button>
        </div>
      </div>
      <p class="hint" data-i18n="archive_section_hint"></p>
      <p id="archive-status" class="archive-status" role="status" aria-live="polite"></p>
      <ul
        id="archive-list"
        class="archive-list"
        role="list"
        aria-label="Archived tabs"
      ></ul>
    </section>

    <script type="module" src="./options.ts"></script>
  </body>
</html>
