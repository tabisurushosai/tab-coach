<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="extension_name">tab-coach</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
      }
      body {
        width: 360px;
        max-height: 480px;
        margin: 0;
        padding: 12px 0;
        box-sizing: border-box;
        overflow: hidden;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        padding: 0 16px 8px;
      }
      h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
      }
      .count {
        font-size: 12px;
        color: #6b7280;
      }
      .category-tabs {
        display: flex;
        gap: 4px;
        padding: 0 12px 8px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        margin-bottom: 4px;
      }
      .category-tab {
        flex: 1;
        padding: 6px 4px;
        margin: 0;
        border: 0;
        border-bottom: 2px solid transparent;
        background: transparent;
        color: #6b7280;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
        border-radius: 4px 4px 0 0;
      }
      .category-tab:hover,
      .category-tab:focus-visible {
        background: rgba(0, 0, 0, 0.04);
        outline: none;
      }
      .category-tab[aria-selected='true'] {
        color: inherit;
        font-weight: 600;
        border-bottom-color: #2563eb;
      }
      .category-tab-count {
        margin-left: 4px;
        font-size: 11px;
        color: #9ca3af;
      }
      @media (prefers-color-scheme: dark) {
        .category-tabs {
          border-bottom-color: rgba(255, 255, 255, 0.12);
        }
        .category-tab {
          color: #9ca3af;
        }
        .category-tab:hover,
        .category-tab:focus-visible {
          background: rgba(255, 255, 255, 0.06);
        }
        .category-tab[aria-selected='true'] {
          border-bottom-color: #60a5fa;
        }
      }
      .tab-list {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 400px;
        overflow-y: auto;
      }
      .tab-item {
        display: flex;
        align-items: center;
      }
      .tab-button {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        min-width: 0;
        padding: 6px 8px 6px 16px;
        margin: 0;
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        text-align: left;
        cursor: pointer;
      }
      .tab-button:hover,
      .tab-button:focus-visible {
        background: rgba(0, 0, 0, 0.04);
        outline: none;
      }
      .tab-close {
        flex-shrink: 0;
        width: 24px;
        height: 24px;
        margin-right: 8px;
        padding: 0;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: #6b7280;
        font: inherit;
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.1s;
      }
      .tab-item:hover .tab-close,
      .tab-close:focus-visible {
        opacity: 1;
      }
      .tab-close:hover,
      .tab-close:focus-visible {
        background: rgba(0, 0, 0, 0.08);
        color: inherit;
        outline: none;
      }
      @media (prefers-color-scheme: dark) {
        .tab-button:hover,
        .tab-button:focus-visible {
          background: rgba(255, 255, 255, 0.06);
        }
        .tab-close {
          color: #9ca3af;
        }
        .tab-close:hover,
        .tab-close:focus-visible {
          background: rgba(255, 255, 255, 0.1);
        }
        .count {
          color: #9ca3af;
        }
      }
      .tab-favicon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        object-fit: contain;
      }
      .tab-title {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .empty {
        padding: 16px;
        color: #6b7280;
        text-align: center;
      }
      .cleanup-bar {
        display: flex;
        justify-content: flex-end;
        padding: 6px 12px 8px;
      }
      .cleanup-button {
        padding: 6px 12px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .cleanup-button:hover,
      .cleanup-button:focus-visible {
        background: #1d4ed8;
        outline: none;
      }
      .cleanup-button:disabled {
        background: rgba(0, 0, 0, 0.08);
        color: #9ca3af;
        cursor: not-allowed;
        border-color: transparent;
      }
      @media (prefers-color-scheme: dark) {
        .cleanup-button {
          background: #3b82f6;
          border-color: rgba(255, 255, 255, 0.12);
        }
        .cleanup-button:hover,
        .cleanup-button:focus-visible {
          background: #2563eb;
        }
        .cleanup-button:disabled {
          background: rgba(255, 255, 255, 0.08);
          color: #6b7280;
        }
      }
      .undo-bar {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: 0 12px 8px;
        padding: 8px 12px;
        border-radius: 6px;
        background: #1f2937;
        color: #f9fafb;
        font-size: 12px;
      }
      .undo-bar[data-visible='true'] {
        display: flex;
      }
      .undo-message {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .undo-countdown {
        margin-left: 4px;
        color: #9ca3af;
      }
      .undo-button {
        flex-shrink: 0;
        padding: 4px 10px;
        border: 0;
        border-radius: 4px;
        background: #60a5fa;
        color: #0b1220;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .undo-button:hover,
      .undo-button:focus-visible {
        background: #3b82f6;
        color: #fff;
        outline: none;
      }
      .undo-button:disabled {
        background: rgba(255, 255, 255, 0.08);
        color: #6b7280;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="title" data-i18n="extension_name">tab-coach</h1>
      <span id="count" class="count"></span>
    </header>
    <div id="category-tabs" class="category-tabs" role="tablist" aria-label="Tab category filter">
      <button type="button" class="category-tab" role="tab" data-category="all" aria-selected="true">
        All<span class="category-tab-count" data-count-for="all"></span>
      </button>
      <button type="button" class="category-tab" role="tab" data-category="inactive" aria-selected="false">
        Inactive<span class="category-tab-count" data-count-for="inactive"></span>
      </button>
      <button type="button" class="category-tab" role="tab" data-category="duplicate" aria-selected="false">
        Duplicate<span class="category-tab-count" data-count-for="duplicate"></span>
      </button>
      <button type="button" class="category-tab" role="tab" data-category="read" aria-selected="false">
        Read<span class="category-tab-count" data-count-for="read"></span>
      </button>
    </div>
    <div class="cleanup-bar">
      <button type="button" id="cleanup-button" class="cleanup-button" disabled>
        <span data-i18n="cleanup_button">Cleanup</span>
        <span id="cleanup-count"></span>
      </button>
    </div>
    <div
      id="undo-bar"
      class="undo-bar"
      role="status"
      aria-live="polite"
      data-visible="false"
    >
      <span class="undo-message">
        <span id="undo-message-text"></span>
        <span id="undo-countdown" class="undo-countdown"></span>
      </span>
      <button type="button" id="undo-button" class="undo-button" data-i18n="undo_button">Undo</button>
    </div>
    <ul id="tab-list" class="tab-list" role="list"></ul>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
