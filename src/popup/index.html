<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="extension_name">tab-coach</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: calc(14px * var(--font-scale, 1));
      }
      body {
        width: 360px;
        max-height: 480px;
        margin: 0;
        padding: 12px 0;
        box-sizing: border-box;
        overflow: hidden;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        padding: 0 16px 8px;
      }
      h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
      }
      .count {
        font-size: 12px;
        color: #6b7280;
      }
      .search-bar {
        position: relative;
        padding: 0 12px 8px;
      }
      .search-input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 28px 6px 10px;
        border: 1px solid rgba(0, 0, 0, 0.16);
        border-radius: 6px;
        background: transparent;
        color: inherit;
        font: inherit;
        font-size: 12px;
      }
      .search-input:focus-visible {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
      }
      .search-clear {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        padding: 0;
        margin: 0;
        border: 0;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.08);
        color: #4b5563;
        font: inherit;
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        display: none;
      }
      .search-clear:hover,
      .search-clear:focus-visible {
        background: rgba(0, 0, 0, 0.16);
        outline: none;
      }
      .search-bar[data-has-query='true'] .search-clear {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      html[data-theme='dark'] .search-input {
        border-color: rgba(255, 255, 255, 0.16);
      }
      html[data-theme='dark'] .search-input:focus-visible {
        border-color: #60a5fa;
        box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.25);
      }
      html[data-theme='dark'] .search-clear {
        background: rgba(255, 255, 255, 0.1);
        color: #d1d5db;
      }
      html[data-theme='dark'] .search-clear:hover,
      html[data-theme='dark'] .search-clear:focus-visible {
        background: rgba(255, 255, 255, 0.18);
      }
      .category-tabs {
        display: flex;
        gap: 4px;
        padding: 0 12px 8px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        margin-bottom: 4px;
      }
      .category-tab {
        flex: 1;
        padding: 6px 4px;
        margin: 0;
        border: 0;
        border-bottom: 2px solid transparent;
        background: transparent;
        color: #6b7280;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
        border-radius: 4px 4px 0 0;
      }
      .category-tab:hover,
      .category-tab:focus-visible {
        background: rgba(0, 0, 0, 0.04);
        outline: none;
      }
      .category-tab[aria-selected='true'] {
        color: inherit;
        font-weight: 600;
        border-bottom-color: #2563eb;
      }
      .category-tab-count {
        margin-left: 4px;
        font-size: 11px;
        color: #9ca3af;
      }
      html[data-theme='dark'] .category-tabs {
        border-bottom-color: rgba(255, 255, 255, 0.12);
      }
      html[data-theme='dark'] .category-tab {
        color: #9ca3af;
      }
      html[data-theme='dark'] .category-tab:hover,
      html[data-theme='dark'] .category-tab:focus-visible {
        background: rgba(255, 255, 255, 0.06);
      }
      html[data-theme='dark'] .category-tab[aria-selected='true'] {
        border-bottom-color: #60a5fa;
      }
      .tab-list {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 400px;
        overflow-y: auto;
      }
      .tab-item {
        display: flex;
        align-items: center;
      }
      .tab-button {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        min-width: 0;
        padding: 6px 8px 6px 16px;
        margin: 0;
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        text-align: left;
        cursor: pointer;
      }
      .tab-button:hover,
      .tab-button:focus-visible {
        background: rgba(0, 0, 0, 0.04);
        outline: none;
      }
      .tab-close {
        flex-shrink: 0;
        width: 24px;
        height: 24px;
        margin-right: 8px;
        padding: 0;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: #6b7280;
        font: inherit;
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.1s;
      }
      .tab-item:hover .tab-close,
      .tab-close:focus-visible {
        opacity: 1;
      }
      .tab-close:hover,
      .tab-close:focus-visible {
        background: rgba(0, 0, 0, 0.08);
        color: inherit;
        outline: none;
      }
      html[data-theme='dark'] .tab-button:hover,
      html[data-theme='dark'] .tab-button:focus-visible {
        background: rgba(255, 255, 255, 0.06);
      }
      html[data-theme='dark'] .tab-close {
        color: #9ca3af;
      }
      html[data-theme='dark'] .tab-close:hover,
      html[data-theme='dark'] .tab-close:focus-visible {
        background: rgba(255, 255, 255, 0.1);
      }
      html[data-theme='dark'] .count {
        color: #9ca3af;
      }
      .tab-favicon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        object-fit: contain;
      }
      .tab-title {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .empty {
        padding: 16px;
        color: #6b7280;
        text-align: center;
      }
      .search-input::-webkit-search-cancel-button {
        display: none;
      }
      .cleanup-bar {
        display: flex;
        justify-content: flex-end;
        gap: 6px;
        padding: 6px 12px 8px;
      }
      .cleanup-button {
        padding: 6px 12px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .cleanup-button:hover,
      .cleanup-button:focus-visible {
        background: #1d4ed8;
        outline: none;
      }
      .cleanup-button:disabled {
        background: rgba(0, 0, 0, 0.08);
        color: #9ca3af;
        cursor: not-allowed;
        border-color: transparent;
      }
      .archive-button {
        padding: 6px 12px;
        border: 1px solid rgba(0, 0, 0, 0.16);
        border-radius: 6px;
        background: transparent;
        color: inherit;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .archive-button:hover,
      .archive-button:focus-visible {
        background: rgba(0, 0, 0, 0.06);
        outline: none;
      }
      .archive-button:disabled {
        background: transparent;
        color: #9ca3af;
        cursor: not-allowed;
        border-color: rgba(0, 0, 0, 0.08);
      }
      html[data-theme='dark'] .cleanup-button {
        background: #3b82f6;
        border-color: rgba(255, 255, 255, 0.12);
      }
      html[data-theme='dark'] .cleanup-button:hover,
      html[data-theme='dark'] .cleanup-button:focus-visible {
        background: #2563eb;
      }
      html[data-theme='dark'] .cleanup-button:disabled {
        background: rgba(255, 255, 255, 0.08);
        color: #6b7280;
      }
      html[data-theme='dark'] .archive-button {
        border-color: rgba(255, 255, 255, 0.16);
      }
      html[data-theme='dark'] .archive-button:hover,
      html[data-theme='dark'] .archive-button:focus-visible {
        background: rgba(255, 255, 255, 0.08);
      }
      html[data-theme='dark'] .archive-button:disabled {
        color: #6b7280;
        border-color: rgba(255, 255, 255, 0.08);
      }
      .undo-bar {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: 0 12px 8px;
        padding: 8px 12px;
        border-radius: 6px;
        background: #1f2937;
        color: #f9fafb;
        font-size: 12px;
      }
      .undo-bar[data-visible='true'] {
        display: flex;
      }
      .undo-message {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .undo-countdown {
        margin-left: 4px;
        color: #9ca3af;
      }
      .undo-button {
        flex-shrink: 0;
        padding: 4px 10px;
        border: 0;
        border-radius: 4px;
        background: #60a5fa;
        color: #0b1220;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .undo-button:hover,
      .undo-button:focus-visible {
        background: #3b82f6;
        color: #fff;
        outline: none;
      }
      .undo-button:disabled {
        background: rgba(255, 255, 255, 0.08);
        color: #6b7280;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="title" data-i18n="extension_name">tab-coach</h1>
      <span id="count" class="count"></span>
    </header>
    <div id="search-bar" class="search-bar" data-has-query="false">
      <input
        type="search"
        id="search-input"
        class="search-input"
        autocomplete="off"
        spellcheck="false"
        data-i18n-attr="placeholder:search_placeholder,aria-label:search_placeholder"
      />
      <button
        type="button"
        id="search-clear"
        class="search-clear"
        data-i18n-attr="aria-label:search_clear_label,title:search_clear_label"
      >×</button>
    </div>
    <div
      id="category-tabs"
      class="category-tabs"
      role="tablist"
      data-i18n-attr="aria-label:popup_category_tabs_aria_label"
    >
      <button type="button" class="category-tab" role="tab" data-category="all" aria-selected="true">
        <span data-i18n="popup_category_all_label">All</span><span class="category-tab-count" data-count-for="all"></span>
      </button>
      <button type="button" class="category-tab" role="tab" data-category="inactive" aria-selected="false">
        <span data-i18n="popup_category_inactive_label">Inactive</span><span class="category-tab-count" data-count-for="inactive"></span>
      </button>
      <button type="button" class="category-tab" role="tab" data-category="duplicate" aria-selected="false">
        <span data-i18n="popup_category_duplicate_label">Duplicate</span><span class="category-tab-count" data-count-for="duplicate"></span>
      </button>
      <button type="button" class="category-tab" role="tab" data-category="read" aria-selected="false">
        <span data-i18n="popup_category_read_label">Read</span><span class="category-tab-count" data-count-for="read"></span>
      </button>
    </div>
    <div class="cleanup-bar">
      <button
        type="button"
        id="archive-button"
        class="archive-button"
        disabled
        data-i18n-attr="aria-label:archive_button_aria_label"
      >
        <span data-i18n="archive_button">Archive</span>
        <span id="archive-count"></span>
      </button>
      <button
        type="button"
        id="cleanup-button"
        class="cleanup-button"
        disabled
        data-i18n-attr="aria-label:cleanup_button_aria_label"
      >
        <span data-i18n="cleanup_button">Cleanup</span>
        <span id="cleanup-count"></span>
      </button>
    </div>
    <div
      id="undo-bar"
      class="undo-bar"
      role="status"
      aria-live="polite"
      data-visible="false"
    >
      <span class="undo-message">
        <span id="undo-message-text"></span>
        <span id="undo-countdown" class="undo-countdown"></span>
      </span>
      <button
        type="button"
        id="undo-button"
        class="undo-button"
        data-i18n="undo_button"
        data-i18n-attr="aria-label:undo_button_aria_label"
      >Undo</button>
    </div>
    <ul
      id="tab-list"
      class="tab-list"
      role="list"
      aria-live="polite"
      aria-relevant="additions text"
      aria-busy="false"
    ></ul>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
