<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="extension_name">tab-coach</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
      }
      body {
        width: 360px;
        max-height: 480px;
        margin: 0;
        padding: 12px 0;
        box-sizing: border-box;
        overflow: hidden;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        padding: 0 16px 8px;
      }
      h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
      }
      .count {
        font-size: 12px;
        color: #6b7280;
      }
      .tab-list {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 400px;
        overflow-y: auto;
      }
      .tab-item {
        display: flex;
        align-items: center;
      }
      .tab-button {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 6px 16px;
        margin: 0;
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        text-align: left;
        cursor: pointer;
      }
      .tab-button:hover,
      .tab-button:focus-visible {
        background: rgba(0, 0, 0, 0.04);
        outline: none;
      }
      @media (prefers-color-scheme: dark) {
        .tab-button:hover,
        .tab-button:focus-visible {
          background: rgba(255, 255, 255, 0.06);
        }
        .count {
          color: #9ca3af;
        }
      }
      .tab-favicon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        object-fit: contain;
      }
      .tab-title {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .empty {
        padding: 16px;
        color: #6b7280;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="title" data-i18n="extension_name">tab-coach</h1>
      <span id="count" class="count"></span>
    </header>
    <ul id="tab-list" class="tab-list" role="list"></ul>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
